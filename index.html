<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meridian</title>
<!--
  OVERTIME — engine + Act I vertical slice
  Single-file, no dependencies, no network calls.

  ARCHITECTURE
  ------------
  1. STATE       — one serializable object (S). Save/load degrades gracefully
                   to in-memory if storage is unavailable.
  2. REGISTERS   — moral temperature. S.dirty counts immoral fork choices.
                   register() maps dirty -> 1 (warm), 2 (slipping), 3 (cold).
                   Log lines are authored in up to 3 register variants.
                   The CSS custom properties on <body> shift with register:
                   the page literally cools. No stat is ever shown.
  3. LOG         — prepend-rendered narrative feed. line({1:"warm",3:"cold"})
                   picks the highest authored variant <= current register.
  4. ACTIONS     — cooldown buttons (A Dark Room style).
  5. FORKS       — modal decision points. Effects mutate state + set flags.
  6. SCHEDULER   — threshold triggers checked after every state change.
  7. LADDER      — the pillar screen. Dots are people. Unlocked at Act I end.
  8. COCOON      — the hidden track. "step outside" counts silently.

  CONTENT/ENGINE SEPARATION: everything narrative lives in CONTENT down
  in one block (LINES, ACTIONS, FORKS, TRIGGERS) so the register corpus
  can grow without touching engine code.
-->
<style>
  :root { color-scheme: dark; }

  /* Register temperature: these three variable sets are the game's
     conscience. Body class r1/r2/r3 selects them. Transitions are slow
     on purpose — the room cools too gradually to catch it happening.
     The register-1 color is hers; the game drains it. */
  body.r1 {
    --bg: #171019;          /* dark plum, a lamp somewhere */
    --paper: #f7eef4;       /* brighter pink-white reading text */
    --dim: #bfa7b8;
    --accent: #e07cb0;      /* dark pink, lifted for contrast */
    --edge: #3c2a3a;
    --glow: rgba(209,106,159,0.06);
  }
  body.r2 {
    --bg: #131019;
    --paper: #ebe5eb;
    --dim: #a49aa8;
    --accent: #c093bd;      /* fading mauve */
    --edge: #2c2532;
    --glow: rgba(169,124,166,0.03);
  }
  body.r3 {
    --bg: #0d1014;          /* clinical cold */
    --paper: #dde5ed;
    --dim: #8b97a4;
    --accent: #a3b8cd;      /* fluorescent */
    --edge: #1e2630;
    --glow: rgba(143,163,184,0.0);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--paper);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    font-size: 19px;
    line-height: 1.7;
    transition: background 6s ease, color 6s ease;
    min-height: 100vh;
  }

  /* faint radial lamp glow, dies with the registers */
  #lamp {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, var(--glow), transparent 70%);
    transition: background 8s ease;
  }

  #app {
    position: relative;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 120px;
  }

  /* ---------- header / counters ---------- */
  #hud {
    display: flex; gap: 24px; align-items: baseline;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 14px; letter-spacing: 0.06em;
    color: var(--dim);
    border-bottom: 1px solid var(--edge);
    padding-bottom: 10px; margin-bottom: 28px;
    min-height: 34px;
    opacity: 0; transition: opacity 2s ease;
  }
  #hud.visible { opacity: 1; }
  .stat b { color: var(--accent); font-weight: 700; font-size: 15px; }
  #tabs { margin-left: auto; display: flex; gap: 14px; }
  .tab {
    cursor: pointer; text-transform: lowercase;
    border: none; background: none; color: var(--dim);
    font: inherit; letter-spacing: inherit; padding: 0;
  }
  .tab.active { color: var(--accent); }
  .tab:focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; }

  /* ---------- log ---------- */
  #log { display: flex; flex-direction: column; gap: 14px; }
  .entry { opacity: 0; transform: translateY(-4px); transition: opacity 1.2s ease, transform 1.2s ease; }
  .entry.shown { opacity: 1; transform: none; }
  .entry.old { opacity: 0.6; }
  .entry.scene { color: var(--accent); }
  .entry em { color: var(--dim); font-style: italic; }

  /* ---------- actions ---------- */
  #actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, var(--bg) 30%);
    padding: 30px 24px 26px;
    transition: background 6s ease;
  }
  #actions-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .act {
    position: relative; overflow: hidden;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 14px; letter-spacing: 0.04em; text-transform: lowercase;
    color: var(--paper);
    background: none;
    border: 1px solid var(--edge);
    padding: 10px 18px;
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s, opacity 0.6s;
  }
  .act:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .act:disabled { cursor: default; color: var(--dim); }
  .act:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }
  .act .cd {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--edge); opacity: 0.5; width: 0%;
    pointer-events: none;
  }
  .act.subtle { border-color: transparent; color: var(--dim); }
  .act.subtle:hover:not(:disabled) { border-color: var(--edge); color: var(--dim); }

  /* ---------- fork modal ---------- */
  #fork {
    position: fixed; inset: 0; display: none;
    background: rgba(0,0,0,0.72);
    align-items: center; justify-content: center;
    padding: 24px; z-index: 10;
  }
  #fork.open { display: flex; }
  #fork-card {
    max-width: 560px; width: 100%;
    background: var(--bg);
    border: 1px solid var(--edge);
    padding: 34px 34px 28px;
  }
  #fork-title {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 16px;
  }
  #fork-body { margin-bottom: 26px; }
  #fork-body p + p { margin-top: 12px; }
  #fork-opts { display: flex; flex-direction: column; gap: 10px; }
  .fork-opt {
    text-align: left; font: inherit;
    background: none; color: var(--paper);
    border: 1px solid var(--edge);
    padding: 12px 16px; cursor: pointer;
    transition: border-color 0.3s;
  }
  .fork-opt:hover { border-color: var(--accent); }
  .fork-opt .sub {
    display: block; font-size: 13px; color: var(--dim); margin-top: 3px;
  }
  /* conscience atrophy: the clean option renders smaller/dimmer at r3 */
  body.r3 .fork-opt.clean { color: var(--dim); font-size: 14.5px; border-color: transparent; }
  body.r2 .fork-opt.clean { font-size: 15.5px; }

  /* ---------- ladder screen ---------- */
  #ladder { display: none; padding-top: 8px; }
  #ladder.visible { display: block; }
  #ladder h2 {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim); font-weight: 400; margin-bottom: 30px;
  }
  .rung {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 0; border-bottom: 1px solid var(--edge);
  }
  .rung .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--dim); flex: none;
  }
  .rung.you .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .rung.fog { filter: blur(3px); opacity: 0.5; user-select: none; }
  .rung.dimmed { opacity: 0.35; }
  .rung .name { font-size: 15px; }
  .rung .lvl {
    margin-left: auto;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; color: var(--dim);
  }

  /* the people blur: at r3 the structure sharpens (brighter divider,
     brighter level tag) while the names (already blanked in the ladder
     data) leave nothing to read in their place. */
  body.r3 .rung { border-bottom-color: var(--paper); }
  body.r3 .rung .lvl { color: var(--paper); font-weight: 600; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
  @media (max-width: 480px) {
    body { font-size: 16px; }
    #app { padding: 28px 18px 130px; }
  }
</style>
</head>
<body class="r1">
<div id="lamp"></div>
<div id="app">
  <div id="hud">
    <span class="stat" id="stat-impact" style="display:none">impact <b>0</b></span>
    <span class="stat" id="stat-energy" style="display:none">energy <b>10</b></span>
    <div id="tabs">
      <button class="tab active" id="tab-floor" style="display:none">the floor</button>
      <button class="tab" id="tab-ladder" style="display:none">the ladder</button>
    </div>
  </div>
  <div id="log" aria-live="polite"></div>
  <div id="ladder"><h2>meridian org ladder</h2><div id="rungs"></div></div>
</div>

<div id="actions"><div id="actions-inner"></div></div>

<div id="fork" role="dialog" aria-modal="true">
  <div id="fork-card">
    <div id="fork-title"></div>
    <div id="fork-body"></div>
    <div id="fork-opts"></div>
  </div>
</div>

<script>
/* ================================================================
   ENGINE
   ================================================================ */

// ---------- state ----------
const DEFAULT_STATE = {
  impact: 0,
  energy: 10,
  energyMax: 10,
  dirty: 0,            // immoral fork count -> register
  cocoon: 0,           // step-outside clicks (never surfaced)
  workClicks: 0,
  flags: {},           // narrative flags: seenX, fork1, etc.
  forkHistory: [],     // [{id, choice, t}]
  act: 0,              // 0 = cold open, 1 = act one, ...
  pendingFork: null,   // id of an open, unresolved fork; re-opened on resume
};
let S = load() || JSON.parse(JSON.stringify(DEFAULT_STATE));

function save() {
  try { localStorage.setItem('overtime_v1', JSON.stringify(S)); } catch (e) { /* in-memory only */ }
}
function load() {
  try {
    const raw = localStorage.getItem('overtime_v1');
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

// ---------- registers ----------
function register() {
  if (S.dirty >= 2) return 3;
  if (S.dirty >= 1) return 2;
  return 1;
}
function applyRegister() {
  document.body.className = 'r' + register();
}

// pick the correct authored variant for the current register.
// variants: {1: "...", 2: "...", 3: "..."} — falls back downward.
function v(variants) {
  if (typeof variants === 'string') return variants;
  const r = register();
  return variants[r] || variants[r - 1] || variants[1];
}

// ---------- log ----------
const logEl = document.getElementById('log');
let entryCount = 0;
function line(variants, cls) {
  const text = v(variants);
  if (!text) return;
  const div = document.createElement('div');
  div.className = 'entry' + (cls ? ' ' + cls : '');
  div.innerHTML = text;
  // prepend: newest on top, older entries fade
  logEl.prepend(div);
  requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('shown')));
  entryCount++;
  [...logEl.children].forEach((el, i) => {
    el.classList.toggle('old', i > 5);
  });
  // keep the DOM sane
  while (logEl.children.length > 60) logEl.lastChild.remove();
}
function scene(variants) { line(variants, 'scene'); }

// queue lines with delays for scripted beats
function seq(items) {
  let t = 0;
  items.forEach(([delay, fn]) => {
    t += delay;
    setTimeout(fn, t);
  });
}

// ---------- HUD ----------
const hud = document.getElementById('hud');
function renderHud() {
  const si = document.getElementById('stat-impact');
  const se = document.getElementById('stat-energy');
  si.querySelector('b').textContent = Math.floor(S.impact);
  se.querySelector('b').textContent = Math.floor(S.energy);
  if (S.flags.hudVisible) {
    hud.classList.add('visible');
    si.style.display = ''; se.style.display = '';
    document.getElementById('tab-floor').style.display = '';
  }
  if (S.flags.ladderUnlocked) {
    document.getElementById('tab-ladder').style.display = '';
  }
}

// ---------- tabs ----------
const ladderEl = document.getElementById('ladder');
document.getElementById('tab-floor').onclick = () => switchTab('floor');
document.getElementById('tab-ladder').onclick = () => switchTab('ladder');
function switchTab(t) {
  document.getElementById('tab-floor').classList.toggle('active', t === 'floor');
  document.getElementById('tab-ladder').classList.toggle('active', t === 'ladder');
  logEl.style.display = t === 'floor' ? '' : 'none';
  ladderEl.classList.toggle('visible', t === 'ladder');
  if (t === 'ladder') renderLadder();
}

// ---------- actions ----------
const actionsEl = document.getElementById('actions-inner');
const activeActions = new Map(); // id -> element
function addAction(def) {
  if (activeActions.has(def.id)) return;
  const btn = document.createElement('button');
  btn.className = 'act' + (def.subtle ? ' subtle' : '');
  btn.innerHTML = '<span class="cd"></span><span class="label">' + def.label + '</span>';
  btn.onclick = () => {
    if (btn.disabled) return;
    def.onClick(btn);
    if (def.cooldown) cooldown(btn, def.cooldown);
    tick();
  };
  actionsEl.appendChild(btn);
  activeActions.set(def.id, btn);
  return btn;
}
function removeAction(id) {
  const el = activeActions.get(id);
  if (el) { el.remove(); activeActions.delete(id); }
}
function cooldown(btn, ms) {
  btn.disabled = true;
  const bar = btn.querySelector('.cd');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => {
    bar.style.transition = 'width ' + ms + 'ms linear';
    bar.style.width = '0%';
  });
  setTimeout(() => { btn.disabled = false; }, ms);
}

// ---------- forks ----------
// Forks are registered by id in FORKS (see CONTENT) so an unresolved fork
// can be rebuilt and re-opened on resume, not just referenced as a loose
// constant at the point it first triggers.
const forkEl = document.getElementById('fork');
function openForkById(id) {
  const build = FORKS[id];
  if (build) openFork(build());
}
function openFork(fork) {
  S.pendingFork = fork.id;
  save();
  document.getElementById('fork-title').textContent = fork.title;
  document.getElementById('fork-body').innerHTML = fork.body.map(p => '<p>' + v(p) + '</p>').join('');
  const opts = document.getElementById('fork-opts');
  opts.innerHTML = '';
  fork.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'fork-opt' + (opt.clean ? ' clean' : '');
    b.innerHTML = v(opt.label) + (opt.sub ? '<span class="sub">' + v(opt.sub) + '</span>' : '');
    b.onclick = () => {
      forkEl.classList.remove('open');
      S.forkHistory.push({ id: fork.id, choice: opt.id, t: Date.now() });
      S.pendingFork = null;
      if (!opt.clean) S.dirty++;
      applyRegister();
      opt.effect();
      save();
      tick();
    };
    opts.appendChild(b);
  });
  forkEl.classList.add('open');
}

// ---------- energy regen ----------
setInterval(() => {
  if (S.energy < S.energyMax) { S.energy = Math.min(S.energyMax, S.energy + 1); renderHud(); save(); }
}, 9000);

// ---------- scheduler ----------
function tick() {
  renderHud();
  TRIGGERS.forEach(tr => {
    if (!S.flags[tr.id] && tr.when()) {
      S.flags[tr.id] = true;
      tr.fire();
    }
  });
  save();
}

/* ================================================================
   LADDER — dots are people
   ================================================================ */
const LADDER = [
  { name: '&nbsp;', lvl: '', fog: true },
  { name: '&nbsp;&nbsp;&nbsp;&nbsp;', lvl: '', fog: true },
  { name: '&nbsp;&nbsp;&nbsp;', lvl: '', fog: true },
  { name: 'Ray Bennett', lvl: 'L7', fog: false, key: 'ray' },
  { name: 'M. Okafor', lvl: 'L6', fog: false, key: 'okafor' },
  { name: 'C. Lind', lvl: 'L6', fog: false, key: 'lind' },
  { name: 'S. Aiyar', lvl: 'L5', fog: false, key: 'aiyar' },
  { name: 'Nora Voss', lvl: 'L4', fog: false, key: 'nora' },
  { name: 'Jess Chen', lvl: 'L4', fog: false, key: 'jess' },
  { name: 'you', lvl: 'L3', you: true },
];
// the people blur as register climbs: r1 full names, r2 first-initial +
// last name (the format the background rungs already used from the
// start), r3 no name at all — just the dot and the level survive.
// idempotent on names already in "X. Last" form.
function ladderDisplayName(name) {
  const r = register();
  if (r <= 1) return name;
  const parts = name.split(' ');
  if (parts.length < 2) return name;
  if (r === 2) return parts[0][0] + '. ' + parts.slice(1).join(' ');
  return '';
}
function renderLadder() {
  const wrap = document.getElementById('rungs');
  wrap.innerHTML = '';
  // gone: the row is dropped entirely, not fogged or dimmed. no placeholder
  // takes its place — the ladder is just shorter than it was.
  LADDER.filter(r => !(r.key && S.flags['gone_' + r.key])).forEach((r, i) => {
    // senior: the fog directly above Ray lifts one rung, and "you" moves up.
    // derived live off the flag so resume never needs its own persisted copy.
    // the top of the ladder must stay unreadable: at least two fogged rungs
    // remain above Castellan even after the lift.
    let name = r.name, lvl = r.lvl, fog = r.fog;
    if (i === 2 && S.flags.senior) { name = 'R. Castellan'; lvl = 'SVP'; fog = false; }
    if (r.you && S.flags.senior) lvl = 'L4';
    if (r.you && S.flags.staff) lvl = 'L5';
    if (!fog && !r.you) name = ladderDisplayName(name);
    const div = document.createElement('div');
    div.className = 'rung' + (fog ? ' fog' : '') + (r.you ? ' you' : '')
      + (r.key && S.flags['dim_' + r.key] ? ' dimmed' : '');
    div.innerHTML = '<span class="dot"></span><span class="name">' + name + '</span><span class="lvl">' + lvl + '</span>';
    wrap.appendChild(div);
  });
}

/* ================================================================
   CONTENT — Act I vertical slice
   All narrative lives below this line. Register variants use {1:,2:,3:}.
   ================================================================ */

// canonical wording of the desk note (Act I). the endgame interview quotes
// this verbatim as a callback — keep this the single source of truth so
// the two never drift apart.
const DESK_NOTE = 'don’t.';

// ----- actions -----
const ACT_FIND_DESK = {
  id: 'findDesk', label: 'find your desk',
  onClick() {
    removeAction('findDesk');
    S.act = 1;
    S.flags.hudVisible = true;
    seq([
      [400,  () => line('rows of desks under fluorescent hum. one has your name on a sticky note. spelled right, first try. that\u2019s new.')],
      [1800, () => line('the drawer still has someone else\u2019s things: a dead phone charger, an expired parking pass, a sticky note that just says \u201c' + DESK_NOTE + '\u201d you toss it with the rest.')],
      [2200, () => line('the laptop is already provisioned. the wallpaper is a mountain nobody here has climbed.')],
      [2200, () => { addAction(ACT_WORK); line('<em>there is work in the queue.</em>'); }],
    ]);
  }
};

const WORK_FLAVOR = [
  { at: 1,  t: 'a small bug. you fix it. somewhere, a dashboard turns green.' },
  { at: 3,  t: 'you learn the codebase the way you learn a city: wrong turns first.' },
  { at: 5,  t: { 1: 'a shoutout in the team channel. six clap emojis. it feels absurdly good.',
                 2: 'a shoutout in the team channel. you screenshot it for the promo file.' } },
  { at: 7,  t: 'the org newsletter runs the team photo. you can find yourself immediately.' },
  { at: 8,  t: 'the work is real. that\u2019s the honest part.' },
  { at: 10, t: 'a director you haven\u2019t met asks if you\u2019re taking the notes. you were presenting.' },
  { at: 12, t: { 1: 'you ship before lunch and spend lunch talking about anything else. Nora does an impression of the build server.',
                 2: 'you ship before lunch and eat at your desk.' } },
];
const ACT_WORK = {
  id: 'work', label: 'work', cooldown: 2500,
  onClick() {
    if (S.energy <= 0) { line('<em>you are running on nothing. it can wait until morning. (energy refills over time.)</em>'); return; }
    S.energy--;
    S.workClicks++;
    S.impact += 1 + Math.floor(S.workClicks / 10);
    const f = WORK_FLAVOR.find(x => x.at === S.workClicks);
    if (f) line(f.t);
  }
};

const ACT_STEP_OUTSIDE = {
  id: 'stepOutside', label: 'step outside', subtle: true,
  onClick() {
    S.cocoon++;
    const lines = [
      'the air is cold. someone is laughing somewhere below.',
      'the roof deck is empty. the city gets on fine without you.',
      'you stand there a while. nothing accrues.',
      'ten minutes go by. nobody notices. that turns out to be fine.',
      'under the far bench, something small and pale, wrapped tight. odd.',
    ];
    line(lines[Math.min(S.cocoon - 1, lines.length - 1)]);
  }
};

// ----- forks -----
const FORK_1 = {
  id: 'fork1',
  title: 'the roadmap review',
  body: [
    'the quarterly review is going well. too well to interrupt.',
    { 1: 'the VP is nodding at the caching proposal on the screen. Jess sketched it on a whiteboard two weeks ago while you took notes. the deck has your name in the footer. she is on the far side of the room, and she has noticed.',
      2: 'the VP is nodding at the caching proposal. Jess\u2019s proposal, technically. your name is in the footer. she is watching you from across the room.' },
    '\u201cthis is exactly the kind of thinking we need,\u201d the VP says, to you.',
  ],
  options: [
    {
      id: 'quiet', clean: false,
      label: 'say thank you',
      sub: 'the moment passes. moments do.',
      effect() {
        S.impact += 15;
        S.flags.visibility = true;
        seq([
          [500,  () => scene('you say thank you.')],
          [2000, () => line({ 1: 'Jess looks at her laptop. after the meeting she is very polite to you, which is worse.',
                              2: 'Jess looks at her laptop. she is polite about it afterward. people usually are.' })],
          [2600, () => line('<em>the VP knows your name now.</em>')],
        ]);
      }
    },
    {
      id: 'correct', clean: true,
      label: 'credit Jess, in the room, out loud',
      sub: 'the momentum is hers now. that was the point.',
      effect() {
        S.flags.creditedJess = true;
        seq([
          [500,  () => scene('\u201cactually, this one\u2019s Jess\u2019s. i just built on it.\u201d')],
          [2000, () => line('a short silence. the VP\u2019s nod moves across the room to her.')],
          [2600, () => line('later she leaves a coffee on your desk without a note.')],
          [3000, () => line('<em>the meeting moves on.</em>')],
        ]);
      }
    },
  ]
};

const FORK_2 = {
  id: 'fork2',
  title: 'the postmortem',
  body: [
    'friday, 2:14 a.m. the payments service goes down for four hours. nobody is hurt. money doesn\u2019t move for four hours, then it does, and by monday it is a paragraph instead of a memory.',
    { 1: 'the root cause is shared: a retry change your team shipped, and a config drift on the offshore team\u2019s side. either one alone would have held.',
      2: 'the root cause is shared, technically. a retry change on your side, a config drift on theirs. either alone would have held.' },
    'the doc has one line for root cause. whatever it says becomes what happened.',
  ],
  options: [
    {
      id: 'straight', clean: true,
      label: 'write it straight',
      sub: 'both causes, in order. the team owns it together.',
      effect() {
        S.flags.postmortemHonest = true;
        S.flags.promoDelayed = true;
        S.impact = Math.max(0, S.impact - 8);
        S.act = 2;
        seq([
          [500,  () => scene('you write both causes, in the order they happened.')],
          [2000, () => line({ 1: 'your manager reads it twice. \u201cthis is going to slow the promo conversation down,\u201d he says. not angry. just accurate.',
                              2: 'your manager reads it twice. \u201cthis will cost you some time on promo,\u201d he says. he does not sound surprised.' })],
          [2600, () => line({ 1: 'the offshore lead sends a one-line thank you. it is the whole message.',
                              2: 'the offshore lead sends a one-line thank you. you almost don\u2019t open it.' })],
          [3000, () => line('<em>the queue is still there monday. it always is.</em>')],
        ]);
      }
    },
    {
      id: 'technical', clean: false,
      label: 'write it "technically accurate"',
      sub: 'root cause: vendor-side config drift. leave it there.',
      effect() {
        S.impact += 12;
        S.flags.scapegoat = true;
        S.flags.scapegoatEchoAt = S.workClicks + 3;
        S.act = 2;
        seq([
          [500,  () => scene('you write it the way that reads cleanest: root cause, config drift, offshore.')],
          [2000, () => line({ 1: 'it is not false. it is just the smaller half of the truth, alone on the page.',
                              2: 'it is not false. it is just the half of the truth that costs you nothing.' })],
          [2600, () => line({ 1: 'your manager forwards it up without a comment. that in itself is a kind of comment.',
                              2: 'your manager forwards it up without a comment.' })],
          [3000, () => line('<em>the queue is still there monday. it always is.</em>')],
        ]);
      }
    },
  ]
};

// ----- character beats -----
function meetRay() {
  seq([
    [0,    () => line('someone stops at your desk. \u201cyou\u2019re the one who fixed the queue thing without being asked. i checked the blame.\u201d Ray Bennett. L7. he seems to actually mean it.')],
    [2600, () => line('\u201clunch is at noon. come find us.\u201d')],
  ]);
}
function meetNora() {
  seq([
    [0,    () => line('the desk beside yours belongs to Nora Voss, who is ranking the conference rooms on a whiteboard for no reason anyone asked.')],
    [2600, () => line('\u201cyou\u2019re new. two things: the fourth floor snacks are better, and nothing here is an actual emergency. they\u2019ll tell you it is. it isn\u2019t.\u201d')],
  ]);
}
function perfCycle() {
  seq([
    [0,    () => scene('performance review, H1.')],
    [2000, () => line('a calibration room you are not in decides what your year meant. Ray is in it.')],
    [3400, () => line(S.flags.creditedJess
      ? '\u201ci told them what you said in the roadmap review,\u201d Ray says after. \u201cthe correction. that cost you a little this cycle. for what it\u2019s worth, i count it.\u201d'
      : '\u201cstrong year,\u201d Ray says after. \u201cthe VP mentioned the caching proposal. you\u2019ve got momentum. spend it on purpose.\u201d')],
    [3600, () => line('<em>a new tab has appeared: the ladder.</em>')],
    [200,  () => { S.flags.ladderUnlocked = true; renderHud(); save(); }],
  ]);
}

// register-3 rereads of confidences Ray has given the player. Never rendered
// by any trigger today; Act IV pulls these directly to enumerate what she
// knows, keyed by S.flags.rayConfidenceNDetail.
const RAY_CONFIDENCES = {
  metrics: {
    3: 'ray bennett, self-reported: two quarters of misattributed growth data, corrected without restatement. known only to you.',
  },
};

function rayConfidence1() {
  S.flags.rayConfidence1 = true;
  S.flags.rayConfidence1Detail = 'metrics';
  save();
  seq([
    [0,    () => scene('the floor thins out by seven. Ray is still at his desk, coat on, in no hurry.')],
    [2600, () => line('\u201cyou know the growth curve in the marketing deck? same one for four years.\u201d he says it like he\u2019s mentioning the weather. \u201cfor two quarters it was wrong. attribution bug, double-counting a channel.\u201d')],
    [3400, () => line('\u201ci found it. fixed it going forward. never restated the old numbers.\u201d a pause. \u201cnobody got hurt. a couple people made L6 off that curve.\u201d')],
    [3000, () => line('he doesn\u2019t say why he\u2019s telling you this. he just tells you.')],
  ]);
}

function noraDeclines() {
  S.flags.noraDeclined = true;
  S.flags.fork3At = S.workClicks + 3;
  save();
  line({
    1: 'a tiger team is forming out of the outage fallout: incident response, cross-team, weeks of long hours. Nora was asked first. she passed.',
    2: 'a tiger team is forming out of the outage fallout: incident response, cross-team, weeks of long hours. Nora was asked first. she passed, which people will remember at calibration.',
    3: 'a tiger team is forming out of the outage. Nora was asked first and passed. noted.',
  });
}

// Nora's exit, after fork3 resolves. her line never changes with the
// register; only the frame around it does. branch: 'solo' | 'shared'.
function noraBeat2(branch) {
  line(branch === 'solo'
    ? 'evening. you\u2019re still at your desk. the hours turned out to be real.'
    : 'evening. the team is fully staffed now and still at it. you\u2019re one of six, not the only one.');
  line('Nora zips her bag. \u201cdinner\u2019s at seven. i\u2019m cooking,\u201d she says.');
  if (register() === 1) line('<em>she\u2019s left by six most nights this month.</em>');
}

function buildFork3() {
  return {
    id: 'fork3',
    title: 'the tiger team',
    body: [
      'the tiger team needs one more. the spot Nora passed on comes to you.',
      { 1: 'the ask is flattering and a little heavy at once: nights, a pager, a seat in rooms you haven\u2019t been in yet.',
        2: 'the ask is heavy: nights, a pager, a seat in rooms you haven\u2019t been in yet. flattering too, if you let it be.' },
      'someone has to be the name on the slide when this is over.',
    ],
    options: [
      {
        id: 'solo', clean: false,
        label: 'take the spot',
        sub: 'the hours are real. so is the slide.',
        effect() {
          S.impact += 20;
          S.energyMax = Math.max(4, S.energyMax - 2);
          S.energy = Math.min(S.energy, S.energyMax);
          S.flags.tigerTeam = true;
          const fork1Dirty = S.forkHistory.some(f => f.id === 'fork1' && f.choice === 'quiet');
          if (fork1Dirty) { S.flags.dim_jess = true; S.flags.jessTransferred = true; }
          seq([
            [500,  () => scene('you take it. the tiger team gets its last body.')],
            [2200, () => line({ 1: 'the hours are what everyone said they\u2019d be. you\u2019re at your desk past nine most nights.',
                                2: 'the hours are what everyone said they\u2019d be. you\u2019re at your desk past nine most nights. it stops registering by wednesday.' })],
            [2200, () => { if (fork1Dirty) line('Jess transfers to a different team. the paperwork lists no reason.'); }],
            [2400, () => noraBeat2('solo')],
          ]);
        }
      },
      {
        id: 'shared', clean: true,
        label: 'push to staff it as a team',
        sub: S.flags.promoDelayed
          ? 'no solo credit, same as last time. you know what that costs now.'
          : 'no solo credit. the team takes the spot together.',
        effect() {
          S.impact += 8;
          S.flags.sharedTeam = true;
          seq([
            [500,  () => scene('you push back: staff it properly, or it eats someone alive.')],
            [2200, () => line('the team gets two more headcount by the end of the week. the hours are still bad. they\u2019re just not only yours.')],
            [2400, () => noraBeat2('shared')],
          ]);
        }
      },
    ],
  };
}

// ----- Act II close -----
function promotionScene() {
  S.flags.senior = true;
  S.flags.act3TeaserAt = Date.now() + 60000;
  save();
  renderLadder();
  seq([
    [500,  () => scene('the promotion goes through at the next cycle.')],
    [2400, () => line(S.flags.promoDelayed
      ? { 1: 'a cycle late. that\u2019s what the postmortem cost, exactly, and you knew it going in.',
          2: 'a cycle late. that\u2019s what the postmortem cost, exactly.' }
      : { 1: 'on time, no friction. the calibration room didn\u2019t need a second meeting.',
          2: 'on time. no friction, no second meeting, no questions.',
          3: 'on time. clean.' })],
    [2600, () => line({ 1: '\u201csenior,\u201d Ray says, like the word still means something to him. \u201cyou earned this one. i\u2019m glad it landed.\u201d',
                        2: '\u201csenior,\u201d Ray says. \u201cyou earned this one.\u201d he means it, mostly.',
                        3: 'Ray sends a two-word message. \u201csenior. congrats.\u201d' })],
  ]);
}

function act3Teaser() {
  S.act = 3;
  save();
  seq([
    [0,    () => scene('the reorg rumors start before the org chart does.')],
    [2600, () => line('a planning deck starts using the phrase \u201cspans of control.\u201d it\u2019s in every staff meeting by Friday.')],
    [2600, () => line('headcount math stops rounding up. from here, every conversation is about who still counts as necessary.')],
  ]);
}

// zero-sum promotion: rising a rung costs someone else theirs. Jess is the
// default casualty (echoes fork1/fork3); if she's already dimmed from that
// branch, the cost falls to Nora instead, so every playthrough has a fresh,
// visible displacement. no fork, no dialogue about it — the ladder just
// changes, and the player finds out by looking.
// the layoff. no announcement, no exec, no reason given anywhere in the
// game's text — the player is only ever shown the absence. jess is the
// casualty the player has watched earn real impact, unless she already
// left via the Act II transfer branch, in which case the background trio
// alone is enough to make the point.
function layoff() {
  ['okafor', 'lind', 'aiyar'].forEach(k => S.flags['gone_' + k] = true);
  if (!S.flags.jessTransferred) S.flags.gone_jess = true;
  renderLadder();
  save();
  seq([
    [0,    () => scene({ 1: 'a tuesday, unremarkable, until you count desks.',
                          2: 'a tuesday. you count desks without meaning to.',
                          3: 'tuesday.' })],
    [2400, () => line(S.flags.jessTransferred
      ? { 1: 'a few desks by the window are empty. their badge photos are still in the directory.',
          2: 'a few desks by the window are empty. the directory hasn’t caught up yet.',
          3: 'three desks empty by the window. the directory hasn’t caught up yet.' }
      : { 1: 'Jess’s desk is empty. her badge photo is still in the directory.',
          2: 'Jess’s desk is empty. the directory hasn’t caught up yet.',
          3: 'three desks empty by the window. the directory hasn’t caught up yet.' })],
    [2400, () => line({ 1: 'no note in the channel. no meeting on the calendar. you ask someone; they don’t know either.',
                        2: 'no note in the channel. no meeting on the calendar. nobody seems to know, or says so.',
                        3: 'no note in the channel. no meeting on the calendar.' })],
    [2600, () => line('<em>the queue is still there monday. it always is.</em>')],
  ]);
}

// how many of the 3 forks the player resolved clean. derived from
// forkHistory (existing since Act I) cross-referenced against each fork's
// already-authored option.clean — no new counter stored on S.
function cleanForkCount() {
  return S.forkHistory.filter(f => {
    const build = FORKS[f.id];
    if (!build) return false;
    const opt = build().options.find(o => o.id === f.choice);
    return !!(opt && opt.clean);
  }).length;
}

// Nora's exit-or-stay. decided on accumulated history, not a fork of her
// own. 2+ of 3 forks clean and she stays, quiet, one small line; otherwise
// she leaves the way real people leave — no speech, no goodbye scene, the
// ladder row just goes quiet like the others. fires a beat after the
// layoff so it reads as its own, separate thing.
function noraResolves() {
  const stays = cleanForkCount() >= 2;
  S.flags.noraResolved = true;
  S.flags.noraStayed = stays;
  if (!stays) S.flags.gone_nora = true;
  renderLadder();
  save();
  line(stays
    ? { 1: 'Nora is still at the desk beside yours, ranking conference rooms for no reason anyone asked.',
        2: 'Nora is still at the desk beside yours.',
        3: 'Nora Voss. still there.' }
    : { 1: 'Nora’s desk is empty one morning. no one mentions it.',
        2: 'Nora’s desk is empty one morning.',
        3: 'Nora Voss: gone.' });
}

function pillarClimb() {
  S.flags.staff = true;
  const target = S.flags.dim_jess ? 'nora' : 'jess';
  S.flags['dim_' + target] = true;
  renderLadder();
  save();
  line({
    1: 'your name moves up a line on the ladder. nobody sends a note about it.',
    2: 'your name moves up a line on the ladder.',
    3: 'ladder updated.',
  });
}

// registry so any fork can be rebuilt and re-opened by id alone (resume,
// pendingFork). fork1/fork2 are static content; fork3 is rebuilt fresh
// each time since its sub-label depends on live flags.
const FORKS = {
  fork1: () => FORK_1,
  fork2: () => FORK_2,
  fork3: buildFork3,
};

// ----- triggers (thresholds) -----
const TRIGGERS = [
  { id: 'trg_nora',    when: () => S.workClicks >= 4,  fire: meetNora },
  { id: 'trg_ray',     when: () => S.workClicks >= 9,  fire: meetRay },
  { id: 'trg_outside', when: () => S.workClicks >= 11, fire: () => addAction(ACT_STEP_OUTSIDE) },
  { id: 'trg_fork1',   when: () => S.impact >= 20,     fire: () => setTimeout(() => openForkById('fork1'), 1200) },
  { id: 'trg_perf',    when: () => S.impact >= 42 && S.forkHistory.some(f => f.id === 'fork1'),
    fire: () => setTimeout(perfCycle, 1500) },
  { id: 'trg_act2',    when: () => S.flags.ladderUnlocked && S.impact >= 60,
    fire: () => setTimeout(() => openForkById('fork2'), 1200) },
  { id: 'trg_scapegoatEcho', when: () => S.flags.scapegoat && S.workClicks >= S.flags.scapegoatEchoAt,
    fire: () => line({ 1: 'the offshore lead pings you: no hard feelings, mistakes happen. you say the same back and mean it.',
                        2: 'the offshore lead pings you: no hard feelings, mistakes happen. you say the same back and don\u2019t.',
                        3: 'the offshore channel has gone quiet. someone else is closing those tickets now.' }) },
  { id: 'trg_rayConfidence1', when: () => S.impact >= 85 && S.forkHistory.some(f => f.id === 'fork2'),
    fire: () => setTimeout(rayConfidence1, 1800) },
  { id: 'trg_noraDeclines', when: () => S.flags.rayConfidence1 && S.impact >= 95,
    fire: () => setTimeout(noraDeclines, 1200) },
  { id: 'trg_fork3', when: () => S.flags.noraDeclined && S.workClicks >= S.flags.fork3At,
    fire: () => setTimeout(() => openForkById('fork3'), 1200) },
  { id: 'trg_promotion', when: () => S.impact >= 150 && S.forkHistory.some(f => f.id === 'fork3'),
    fire: () => setTimeout(promotionScene, 1800) },
  { id: 'trg_act3Teaser', when: () => S.flags.senior && S.flags.act3TeaserAt && Date.now() >= S.flags.act3TeaserAt,
    fire: act3Teaser },
  { id: 'trg_pillarClimb', when: () => S.act === 3 && S.impact >= 180,
    fire: () => setTimeout(pillarClimb, 1500) },
  { id: 'trg_layoff', when: () => S.flags.staff && S.impact >= 220,
    fire: () => setTimeout(layoff, 1500) },
  { id: 'trg_noraResolves', when: () => S.flags.trg_layoff && S.impact >= 260,
    fire: () => setTimeout(noraResolves, 1500) },
];

/* ================================================================
   BOOT
   ================================================================ */
applyRegister();
renderHud();

// an unresolved fork outlives a reload: rebuild and re-open it before
// anything else so it can never be silently skipped.
if (S.pendingFork) openForkById(S.pendingFork);

if (S.act === 0 && S.workClicks === 0) {
  // cold open
  seq([
    [600,  () => scene('your badge works. you\u2019re in.')],
    [2200, () => addAction(ACT_FIND_DESK)],
  ]);
} else {
  // resume
  line('<em>you\u2019re back. the queue kept growing while you were gone. it always does.</em>');
  addAction(ACT_WORK);
  if (S.flags.trg_outside) addAction(ACT_STEP_OUTSIDE);
  tick();
}
</script>
</body>
</html>
